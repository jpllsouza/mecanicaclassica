<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Lista de Fichas</title>
  <style>
    body { font-family: "Poppins", "Segoe UI", Tahoma, sans-serif; background:#f7f8fa; color:#0b0c0f; padding:24px; }
    .wrap { max-width: 1100px; margin: 0 auto; background:#fff; border:1px solid #e6e8ec; border-radius:16px; padding:20px; }
    h1 { margin-top:0; }
    table { width:100%; border-collapse: collapse; }
    th, td { padding:10px; border-bottom:1px solid #e6e8ec; text-align:left; }
    .row { margin: 12px 0; display:flex; gap:10px; align-items:center; }
    input { border:1px solid #e6e8ec; border-radius:10px; padding:8px 10px; }
    button { background:#0b0c0f; color:#fff; border:0; padding:8px 12px; border-radius:10px; cursor:pointer; font-weight:600; }
    .note { font-size:12px; color:#6b7280; }
    a { color:#0b0c0f; text-decoration:underline; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Admin - Lista de Fichas</h1>
    <div class="row">
      <label>Admin Key <input id="admin_key" type="password" /></label>
      <label>Limite <input id="limit" type="number" value="50" /></label>
      <button id="load">Carregar</button>
      <span id="msg" class="note"></span>
    </div>
    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Marca</th>
          <th>Modelo</th>
          <th>Ano</th>
          <th>Versão</th>
          <th>Ação</th>
        </tr>
      </thead>
      <tbody id="rows"></tbody>
    </table>
  </div>

  <script>
    document.getElementById("load").addEventListener("click", async () => {
      const key = document.getElementById("admin_key").value;
      const limit = document.getElementById("limit").value || 50;
      const msg = document.getElementById("msg");
      msg.textContent = "Carregando...";
      const res = await fetch(`/api/admin/list?limit=${limit}`, {
        headers: { "X-Admin-Key": key }
      });
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        msg.textContent = "Erro: " + (err.error || res.status);
        return;
      }
      const data = await res.json();
      const tbody = document.getElementById("rows");
      tbody.innerHTML = "";
      data.forEach(row => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${row.trim_id}</td>
          <td>${row.make}</td>
          <td>${row.model}</td>
          <td>${row.year}</td>
          <td>${row.trim}</td>
          <td><a href="/admin.html?trim_id=${row.trim_id}">Editar</a></td>
        `;
        tbody.appendChild(tr);
      });
      msg.textContent = `Carregado: ${data.length}`;
    });
  </script>
</body>
</html>
